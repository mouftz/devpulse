name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            web/package-lock.json
      - name: API dependencies
        run: npm ci
        working-directory: api
      - name: API tests
        run: npm test
        working-directory: api
      - name: Frontend dependencies
        run: npm ci
        working-directory: web
      - name: Frontend tests and build
        run: npm test && npm run build
        working-directory: web
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ml-service/requirements.txt
      - name: ML dependencies
        run: pip install -r requirements.txt
        working-directory: ml-service
      - name: Validate ML service
        run: python -m compileall api features models notebooks && python -m unittest discover -s tests
        working-directory: ml-service

  containers:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target prod -t devpulse-api ./api
      - run: docker build -t devpulse-ml ./ml-service
      - run: docker build --build-arg VITE_API_URL=https://api.example.com -t devpulse-web ./web
