name: Deploy to GCP

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY }}
  CLOUD_SQL_INSTANCE: ${{ vars.GCP_CLOUD_SQL_INSTANCE }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push API
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/api:${GITHUB_SHA}"
          docker build --target prod -t "$IMAGE" ./api
          docker push "$IMAGE"
          echo "API_IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - name: Build and push ML service
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/ml:${GITHUB_SHA}"
          docker build -t "$IMAGE" ./ml-service
          docker push "$IMAGE"
          echo "ML_IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - name: Build and push frontend
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/web:${GITHUB_SHA}"
          docker build --build-arg VITE_API_URL="${{ vars.PUBLIC_API_URL }}" -t "$IMAGE" ./web
          docker push "$IMAGE"
          echo "WEB_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Run database migrations
        run: |
          gcloud run jobs deploy devpulse-migrate \
            --image "$API_IMAGE" --region "$REGION" \
            --command npx --args prisma,migrate,deploy \
            --set-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --set-secrets DATABASE_URL=devpulse-database-url:latest \
            --service-account "${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}" --quiet
          gcloud run jobs execute devpulse-migrate --region "$REGION" --wait

      - name: Deploy model service
        run: |
          gcloud run deploy devpulse-ml --image "$ML_IMAGE" --region "$REGION" \
            --port 8001 --allow-unauthenticated \
            --add-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --set-secrets DATABASE_URL=devpulse-database-url:latest,ML_SERVICE_TOKEN=devpulse-ml-token:latest \
            --service-account "${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}" --quiet
          echo "ML_URL=$(gcloud run services describe devpulse-ml --region "$REGION" --format='value(status.url)')" >> "$GITHUB_ENV"

      - name: Deploy API
        run: |
          gcloud run deploy devpulse-api --image "$API_IMAGE" --region "$REGION" \
            --port 3000 --allow-unauthenticated \
            --add-cloudsql-instances "$CLOUD_SQL_INSTANCE" \
            --set-env-vars NODE_ENV=production,HOST=0.0.0.0,FRONTEND_URL=${{ vars.FRONTEND_URL }},GITHUB_CALLBACK_URL=${{ vars.GITHUB_CALLBACK_URL }},ML_SERVICE_URL=$ML_URL \
            --set-secrets DATABASE_URL=devpulse-database-url:latest,REDIS_URL=devpulse-redis-url:latest,JWT_SECRET=devpulse-jwt-secret:latest,TOKEN_ENCRYPTION_KEY=devpulse-token-key:latest,ML_SERVICE_TOKEN=devpulse-ml-token:latest,GITHUB_CLIENT_ID=devpulse-github-client-id:latest,GITHUB_CLIENT_SECRET=devpulse-github-client-secret:latest \
            --service-account "${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}" --quiet

      - name: Deploy frontend
        run: |
          gcloud run deploy devpulse-web --image "$WEB_IMAGE" --region "$REGION" \
            --port 8080 --allow-unauthenticated \
            --service-account "${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}" --quiet
