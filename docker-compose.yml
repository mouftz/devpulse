# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  devpulse_net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  grafana_data:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Postgres ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: devpulse
      POSTGRES_PASSWORD: devpulse_secret
      POSTGRES_DB: devpulse_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - devpulse_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (queue + cache) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - devpulse_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (Node / Fastify + Prisma) ────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://devpulse:devpulse_secret@postgres:5432/devpulse_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_in_production
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITEA_BASE_URL: ${GITEA_BASE_URL:-}
      GITEA_TOKEN: ${GITEA_TOKEN:-}
      PROVIDER_REQUEST_CONCURRENCY: ${PROVIDER_REQUEST_CONCURRENCY:-5}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      ML_SERVICE_URL: http://ml-service:8001
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN:-}
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules       # anonymous volume so host node_modules don't shadow
    networks:
      - devpulse_net

  # ── ML service (Python / FastAPI + scikit-learn) ─────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://devpulse:devpulse_secret@postgres:5432/devpulse_db
      REDIS_URL: redis://redis:6379
      MODEL_DIR: /app/models/saved
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN:-}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml-service:/app
    networks:
      - devpulse_net

  # ── Sync worker (Redis queue + nightly scheduler) ───────────────────────────
  etl-worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: npm run worker:dev
    environment:
      DATABASE_URL: postgresql://devpulse:devpulse_secret@postgres:5432/devpulse_db
      REDIS_URL: redis://redis:6379
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-86400}
      RUN_ON_START: ${RUN_ON_START:-true}
      SYNC_MAX_ATTEMPTS: ${SYNC_MAX_ATTEMPTS:-3}
      SYNC_RETRY_BASE_MS: ${SYNC_RETRY_BASE_MS:-5000}
      SYNC_RETRY_MAX_MS: ${SYNC_RETRY_MAX_MS:-60000}
      JWT_SECRET: change_me_in_production
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITEA_BASE_URL: ${GITEA_BASE_URL:-}
      GITEA_TOKEN: ${GITEA_TOKEN:-}
      PROVIDER_REQUEST_CONCURRENCY: ${PROVIDER_REQUEST_CONCURRENCY:-5}
      ML_SERVICE_URL: http://ml-service:8001
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN:-}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - devpulse_net

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - devpulse_net

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - devpulse_net
