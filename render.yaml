services:
  - type: web
    name: devpulse-ml
    runtime: docker
    plan: free
    region: ohio
    dockerfilePath: ./ml-service/Dockerfile
    dockerContext: ./ml-service
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ML_SERVICE_TOKEN
        generateValue: true
      - key: PORT
        value: 10000

  - type: web
    name: devpulse-api
    runtime: docker
    plan: free
    region: ohio
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    healthCheckPath: /health
    dockerCommand: sh -c "npx prisma migrate deploy && node dist/index.js"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: ML_SERVICE_TOKEN
        fromService:
          name: devpulse-ml
          type: web
          envVarKey: ML_SERVICE_TOKEN
      - key: JWT_SECRET
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GITEA_BASE_URL
        sync: false
      - key: GITEA_TOKEN
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: RUN_WORKER_IN_API
        value: true
      - key: SYNC_INTERVAL_SECONDS
        value: 86400
      - key: RUN_ON_START
        value: true

  - type: web
    name: devpulse-web
    runtime: static
    buildCommand: cd web && npm ci && npm run build
    staticPublishPath: ./web/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
